<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyServer</title>
    <link rel="stylesheet" href="../css/dashboards.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

    <div class="topo">
        <h1>EasyServer</h1>

        <div>
            Sensor:
            <select id="sensor">
                <!-- Populado dinamicamente via API -->
                <option value="">Carregando...</option>
            </select>
        </div>
    </div>


    <div class="container">

        <!-- ESQUERDA -->
        <div class="esquerda">

            <div class="kpis">
                <div class="card">
                    <h3>Temperatura Atual</h3>
                    <p id="tempAtual">--°C</p>
                </div>
                <div class="card">
                    <h3>Umidade Atual</h3>
                    <p id="umiAtual">--%</p>
                </div>
            </div>

            <div class="linha">
                <div class="graficoMenor">
                    <canvas id="graficoTemp"></canvas>
                </div>
                <div class="graficoMenor">
                    <canvas id="graficoUmidade"></canvas>
                </div>
            </div>

            <div class="graficoGrande">
                <canvas id="graficoPrincipal"></canvas>
            </div>

            <p class="aviso-captura" id="avisoCaptura"></p>

        </div>


        <!-- DIREITA -->
        <div class="direita">

            <div class="box-alerta">
                <h2>Alertas</h2>
                <p id="alertas">--</p>
            </div>

            <div class="box-tab-status">
                <h2>Status dos Sensores</h2>

                <div class="tabela">
                    <div class="linha-topo">
                        <div>Sensor</div>
                        <div>Local</div>
                        <div>Temp</div>
                        <div>Umid</div>
                        <div>Status</div>
                    </div>

                    <div id="tabelaCorpo">
                        <!-- Linhas geradas dinamicamente -->
                    </div>
                </div>
            </div>

        </div>

    </div>
</body>
</html>
    <script>

        var LIMITE_TEMP = 27;
        var LIMITE_UMI  = 55;
        
        var INTERVALO_MS = 2000;

        /* Referência ao próximo timeout de atualização */
        var proximaAtualizacao;

        /* Estrutura que guarda instâncias dos gráficos por sensor */
        var sensores = {};

        /* Sensor selecionado atualmente */
        var sensorAtivo = null;

        /*
         * ID da empresa logada.
         * Ajuste conforme sua autenticação — ex: leia de um cookie,
         * de sessionStorage, ou de um endpoint de sessão.
         */
        var ID_EMPRESA = 1;

        /* FUNÇÕES DE FETCH — consomem a API real  */
        function fetchUltimas(idSensor) {
            return fetch(`/dashboard/ultimas/${idSensor}`, { cache: 'no-store' })
                .then(function(r) {
                    if (!r.ok) throw new Error('Erro HTTP ' + r.status);
                    return r.json();
                });
        }

        function fetchTempoReal(idSensor) {
            return fetch(`/dashboard/tempo-real/${idSensor}`, { cache: 'no-store' })
                .then(function(r) {
                    if (!r.ok) throw new Error('Erro HTTP ' + r.status);
                    return r.json();
                });
        }

        function fetchStatusSensores(idEmpresa) {
            return fetch(`/dashboard/status/${idEmpresa}`, { cache: 'no-store' })
                .then(function(r) {
                    if (!r.ok) throw new Error('Erro HTTP ' + r.status);
                    return r.json();
                });
        }

        function fetchSensoresDaEmpresa(idEmpresa) {
            return fetch(`/dashboard/sensores/${idEmpresa}`, { cache: 'no-store' })
                .then(function(r) {
                    if (!r.ok) throw new Error('Erro HTTP ' + r.status);
                    return r.json();
                });
        }


        /*  POPULAR SELECT DE SENSORES */
        function popularSelectSensores() {
            fetchSensoresDaEmpresa(ID_EMPRESA)
                .then(function(lista) {
                    var select = document.getElementById('sensor');
                    select.innerHTML = '';

                    if (!lista.length) {
                        select.innerHTML = '<option value="">Nenhum sensor ativo</option>';
                        return;
                    }

                    lista.forEach(function(s) {
                        var opt = document.createElement('option');
                        opt.value       = s.idSensor;
                        opt.textContent = 'Sensor ' + String(s.idSensor).padStart(2, '0') + ' - ' + s.local;
                        select.appendChild(opt);
                    });

                    /* Inicia com o primeiro sensor da lista */
                    sensorAtivo = parseInt(lista[0].idSensor);
                    obterDadosGrafico(sensorAtivo);
                })
                .catch(function(err) {
                    console.error('Erro ao carregar sensores:', err);
                    document.getElementById('sensor').innerHTML =
                        '<option value="">Erro ao carregar</option>';
                });
        }

        function obterDadosGrafico(idSensor) {

            if (proximaAtualizacao != undefined) {
                clearTimeout(proximaAtualizacao);
            }

            fetchUltimas(idSensor)
                .then(function(resposta) {
                    console.log("Dados recebidos:", resposta);
                    plotarGrafico(resposta, idSensor);
                })
                .catch(function(err) {
                    console.error("Erro ao obter dados do gráfico:", err);
                });

            fetchStatusSensores(ID_EMPRESA)
                .then(function(statusList) {
                    renderizarTabela(statusList);
                    atualizarKPIs(statusList, idSensor);
                    contarAlertas(statusList);
                })
                .catch(function(err) {
                    console.error("Erro ao obter status dos sensores:", err);
                });
        }


        function plotarGrafico(resposta, idSensor) {

            console.log("Plotando gráfico para sensor:", idSensor);

            /* Destrói instâncias anteriores se existirem */
            if (sensores[idSensor]) {
                sensores[idSensor].principal.destroy();
                sensores[idSensor].gTemp.destroy();
                sensores[idSensor].gUmi.destroy();
            }

            var labels    = [];
            var datasTemp = [];
            var datasUmi  = [];

            resposta.forEach(function(reg) {
                labels.push(reg.momento_grafico);
                datasTemp.push(reg.temperatura);
                datasUmi.push(reg.umidade);
            });

            /* Dados compartilhados (referência) para janela deslizante */
            var dadosCompartilhados = {
                labels:    labels,
                datasTemp: datasTemp,
                datasUmi:  datasUmi
            };

            /* ------ GRÁFICO PRINCIPAL (barras + linhas de limite) ------ */
            var principal = new Chart(
                document.getElementById("graficoPrincipal"),
                {
                    data: {
                        labels: labels,
                        datasets: [
                            {
                                type: "bar",
                                label: "Temperatura",
                                data: datasTemp,
                                backgroundColor: "red"
                            },
                            {
                                type: "bar",
                                label: "Umidade",
                                data: datasUmi,
                                backgroundColor: "blue"
                            },
                            {
                                type: "line",
                                label: "Limite Temp",
                                data: Array(labels.length).fill(LIMITE_TEMP),
                                borderColor: "red",
                                pointRadius: 0
                            },
                            {
                                type: "line",
                                label: "Limite Umidade",
                                data: Array(labels.length).fill(LIMITE_UMI),
                                borderColor: "blue",
                                pointRadius: 0
                            }
                        ]
                    }
                }
            );

            /* ------ GRÁFICO MENOR: TEMPERATURA ------ */
            var gTemp = new Chart(
                document.getElementById("graficoTemp"),
                {
                    type: "line",
                    data: {
                        labels: labels,
                        datasets: [{
                            label: "Temperatura",
                            data: datasTemp,
                            borderColor: "red"
                        }]
                    }
                }
            );

            /* ------ GRÁFICO MENOR: UMIDADE ------ */
            var gUmi = new Chart(
                document.getElementById("graficoUmidade"),
                {
                    type: "line",
                    data: {
                        labels: labels,
                        datasets: [{
                            label: "Umidade",
                            data: datasUmi,
                            borderColor: "blue"
                        }]
                    }
                }
            );

            /* Salva referências */
            sensores[idSensor] = {
                principal: principal,
                gTemp:     gTemp,
                gUmi:      gUmi,
                dados:     dadosCompartilhados
            };

            /* Inicia ciclo de atualização em tempo real */
            proximaAtualizacao = setTimeout(function() {
                atualizarGrafico(idSensor);
            }, INTERVALO_MS);
        }


        /*  ATUALIZAR GRÁFICO (janela deslizante) */

        function atualizarGrafico(idSensor) {

            fetchTempoReal(idSensor)
                .then(function(novoRegistro) {

                    console.log("Dado tempo real recebido:", novoRegistro);

                    var avisoCaptura = document.getElementById("avisoCaptura");
                    var s = sensores[idSensor];

                    if (!s) return;

                    var dados       = s.dados;
                    var ultimoLabel = dados.labels[dados.labels.length - 1];

                    avisoCaptura.innerHTML = "";

                    if (!novoRegistro.length || novoRegistro[0].momento_grafico === ultimoLabel) {
                        avisoCaptura.innerHTML = "⚠ Aguardando nova captura do sensor...";
                        console.log("Sem dados novos — gráfico não atualizado.");
                    } else {
                        /* Remove o primeiro ponto e insere o novo */
                        dados.labels.shift();
                        dados.labels.push(novoRegistro[0].momento_grafico);

                        dados.datasTemp.shift();
                        dados.datasTemp.push(novoRegistro[0].temperatura);

                        dados.datasUmi.shift();
                        dados.datasUmi.push(novoRegistro[0].umidade);

                        /* Atualiza datasets */
                        s.principal.data.datasets[0].data = [...dados.datasTemp];
                        s.principal.data.datasets[1].data = [...dados.datasUmi];
                        s.gTemp.data.datasets[0].data     = [...dados.datasTemp];
                        s.gUmi.data.datasets[0].data      = [...dados.datasUmi];

                        /* Atualiza labels */
                        s.principal.data.labels = [...dados.labels];
                        s.gTemp.data.labels     = [...dados.labels];
                        s.gUmi.data.labels      = [...dados.labels];

                        s.principal.update();
                        s.gTemp.update();
                        s.gUmi.update();

                        /* Atualiza KPIs */
                        var ultima = novoRegistro[0];
                        document.getElementById("tempAtual").innerHTML = ultima.temperatura + "°C";
                        document.getElementById("umiAtual").innerHTML  = ultima.umidade + "%";
                    }

                    proximaAtualizacao = setTimeout(function() {
                        atualizarGrafico(idSensor);
                    }, INTERVALO_MS);

                })
                .catch(function(err) {
                    console.error("Erro ao buscar dado tempo real:", err);
                    proximaAtualizacao = setTimeout(function() {
                        atualizarGrafico(idSensor);
                    }, INTERVALO_MS);
                });
        }


        /*  TABELA DE STATUS */
        function calcularStatus(temp, umi) {
            if (temp >= LIMITE_TEMP || umi >= LIMITE_UMI + 10) return { label: "Crítico",  cls: "critico" };
            if (temp >= LIMITE_TEMP - 2 || umi >= LIMITE_UMI)    return { label: "Atenção",  cls: "atencao" };
            return                                                       { label: "Normal",   cls: "normal"  };
        }

        function renderizarTabela(statusList) {
            var corpo = document.getElementById("tabelaCorpo");
            corpo.innerHTML = "";

            statusList.forEach(function(s, i) {
                var st = calcularStatus(s.temperatura, s.umidade);
                corpo.innerHTML += `
                    <div class="linha-status">
                        <div>${s.nome}</div>
                        <div>${s.local}</div>
                        <div>${s.temperatura != null ? s.temperatura + '°C' : '--'}</div>
                        <div>${s.umidade     != null ? s.umidade     + '%'  : '--'}</div>
                        <div>
                            <span class="${st.cls}" id="st${i+1}">${st.label}</span>
                        </div>
                    </div>
                `;
            });
        }

        function atualizarKPIs(statusList, idSensor) {
            var ref = statusList.find(function(s, i) { return i === idSensor - 1; })
                   || statusList[0];
            if (!ref) return;
            document.getElementById("tempAtual").innerHTML = (ref.temperatura != null ? ref.temperatura + '°C' : '--°C');
            document.getElementById("umiAtual").innerHTML  = (ref.umidade     != null ? ref.umidade     + '%'  : '--%');
        }

        function contarAlertas(statusList) {
            var count = statusList.filter(function(s) {
                var st = calcularStatus(s.temperatura, s.umidade);
                return st.cls === "critico" || st.cls === "atencao";
            }).length;

            var txt = count === 0 ? "Nenhum alerta ativo" :
                      count === 1 ? "1 ativo" : count + " ativos";

            document.getElementById("alertas").innerHTML = txt;
        }
    
        document.getElementById("sensor").addEventListener("change", function() {
            if (proximaAtualizacao != undefined) {
                clearTimeout(proximaAtualizacao);
            }
            sensorAtivo = parseInt(this.value);
            obterDadosGrafico(sensorAtivo);
        });


        window.onload = function() {
            popularSelectSensores();
        };

    </script>
