<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>São Paulo | Login</title>

    <script src="./js/sessao.js"></script>

    <link rel="stylesheet" href="./css/login.css">
    <link rel="icon" href="./assets/imgs/logo.png">
    <link rel="preconnect" href="https://fonts.gstatic.com">
</head>

<body>

    <!-- Header -->
    <header class="header">
        <section>
            <a href="index.html" class="logo">
                <img src="./assets/imgs/logo.png" alt="logo sp">
            </a>

            <nav class="navbar">
                <a href="quiz.html">Quiz</a>
                <a href="elenco.html">Elenco</a>
                <a href="historia.html">História</a>
                <a href="login.html" class="btn-nav">Login</a>
                <a href="cadastro.html" class="btn-nav">Cadastro</a>
            </nav>
        </section>
    </header>

    <!-- Login -->
    <div class="login">

        <!-- Card Erro -->
        <div class="alerta_erro">
            <div class="card_erro" id="cardErro">
                <span id="mensagem_erro"></span>
            </div>
        </div>

        <div class="countainer">
            <div class="card card-login">

                <h2>Olá de volta!</h2>

                <div class="formulario">

                    <div class="campo">
                        <span>E-mail:</span>
                        <input id="email_input" type="email" placeholder="Digite seu e-mail">
                    </div>

                    <div class="campo">
                        <span>Senha:</span>
                        <input id="senha_input" type="password" placeholder="******">
                    </div>

                    <button class="botao" onclick="entrar()">
                        Entrar
                    </button>

                </div>

                <div id="div_aguardar" class="loading-div" style="display: none;">
                    <img src="./assets/circle-loading.gif" id="loading-gif">
                </div>

                <div id="div_erros_login"></div>

            </div>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        <div class="container">
            <h4>
                Desenvolvido por: <br>
                João Miguel Leite Sousa
            </h4>
        </div>
    </div>

</body>

</html>

<script>

    function entrar() {

        var emailVar = email_input.value;
        var senhaVar = senha_input.value;

        // Verificação dos campos
        if (emailVar == "" || senhaVar == "") {

            cardErro.style.display = "block";
            mensagem_erro.innerHTML = "Preencha todos os campos!";

            setTimeout(sumirMensagem, 5000);

            return false;
        }

        // Loading
        div_aguardar.style.display = "block";

        fetch("/usuarios/autenticar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                emailServer: emailVar,
                senhaServer: senhaVar
            })
        })

        .then(function (resposta) {

            div_aguardar.style.display = "none";

            if (resposta.ok) {

                resposta.json().then(function (json) {

                    console.log(json);

                    sessionStorage.EMAIL_USUARIO = json.email;
                    sessionStorage.NOME_USUARIO = json.nome;
                    sessionStorage.ID_USUARIO = json.id_usuario;

                    cardErro.style.display = "none";

                    window.location = "quiz.html";

                });

            } else {

                cardErro.style.display = "block";
                mensagem_erro.innerHTML = "E-mail ou senha inválidos!";

                setTimeout(sumirMensagem, 5000);
            }

        })

        .catch(function (erro) {

            div_aguardar.style.display = "none";

            console.log("Erro:", erro);

            cardErro.style.display = "block";
            mensagem_erro.innerHTML = "Erro ao realizar login!";

            setTimeout(sumirMensagem, 5000);

        });

        return false;
    }

    function sumirMensagem() {
        cardErro.style.display = "none";
    }

</script>
